; CallLens PHP runtime defaults (shared dev/prod).
memory_limit = 256M
upload_max_filesize = 200M       ; audio uploads can be large
post_max_size = 210M
max_execution_time = 120
date.timezone = UTC
expose_php = Off

; OPcache — tuned for prod; harmless in dev.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1   ; prod image flips this to 0
realpath_cache_size = 4096K
realpath_cache_ttl = 600
