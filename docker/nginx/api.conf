# CallLens API vhost — reverse proxy to PHP-FPM (Symfony public/index.php).
server {
    listen 80;
    server_name _;
    root /app/public;

    client_max_body_size 210M;   # match php upload limits (audio)

    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Only index.php is executable; everything else 404s.
    location ~ ^/index\.php(/|$) {
        fastcgi_pass api:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    # Security headers (baseline; CSP tightened per route later).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    error_log /var/log/nginx/api_error.log;
    access_log /var/log/nginx/api_access.log;
}
