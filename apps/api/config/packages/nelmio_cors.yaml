nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['%env(CORS_ALLOW_ORIGIN)%']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization']
        # Required so the browser sends/stores the auth cookies cross-origin.
        allow_credentials: true
        max_age: 3600
    paths:
        # The SPA (WEB_URL) talks to these from a different port/origin.
        '^/(api|auth|v1)/': ~
