framework:
    rate_limiter:
        # Throttle account creation per client IP (spec §11/§16).
        registration:
            policy: sliding_window
            limit: 5
            interval: '15 minutes'
        # Throttle password-reset requests per client IP (spec §11/§16).
        password_reset:
            policy: sliding_window
            limit: 5
            interval: '15 minutes'
