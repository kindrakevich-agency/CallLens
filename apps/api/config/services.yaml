# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # --- Object storage (AsyncAws S3 client → MinIO/Hetzner) -----------------
    AsyncAws\S3\S3Client:
        arguments:
            $configuration:
                endpoint: '%env(S3_ENDPOINT)%'
                accessKeyId: '%env(S3_KEY)%'
                accessKeySecret: '%env(S3_SECRET)%'
                region: '%env(S3_REGION)%'
                pathStyleEndpoint: '%env(bool:S3_USE_PATH_STYLE)%'

    App\Application\Provider\ObjectStorage: '@App\Infrastructure\Storage\FlysystemObjectStorage'

    # --- AI providers ---------------------------------------------------------
    # STT selected from AI_STT_PROVIDER (fake | deepgram).
    App\Application\Provider\SpeechToTextClient:
        factory: ['@App\Infrastructure\Provider\SttClientFactory', 'create']

    # Scoring selected from AI_LLM_PROVIDER (fake | openai), then wrapped by the
    # evidence-validating decorator so fabricated quotes are dropped.
    scoring.inner_client:
        class: App\Application\Provider\ScoringClient
        factory: ['@App\Infrastructure\Provider\ScoringClientFactory', 'create']
    App\Application\Provider\ScoringClient:
        class: App\Infrastructure\Provider\EvidenceValidatingScoringClient
        arguments:
            $inner: '@scoring.inner_client'

    # Embeddings still fake — real selection lands in M5.
    App\Application\Provider\EmbeddingClient: '@App\Infrastructure\Provider\Fake\FakeEmbedding'
